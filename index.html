<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maincrafts Technology | Contact Us</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>


<div class="container">

    <div class="brand-header animate-fade-in">
        <div class="logo-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2" />
                <line x1="12" y1="22" x2="12" y2="15.5" />
                <polyline points="22 8.5 12 15.5 2 8.5" />
                <polyline points="2 15.5 12 8.5 22 15.5" />
                <line x1="12" y1="2" x2="12" y2="8.5" />
            </svg>
        </div>
        <h1>Maincrafts Technology</h1>
        <p class="subtitle">Java Full Stack Internship Task</p>
    </div>

    <div class="card animate-scale-up">
        
        <div id="contact-form-container">
            <h2>Get in Touch</h2>
            <p class="card-desc">We'd love to hear from you. Please fill out the form below.</p>
            
            <form id="contactForm" action="/contact" method="post">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        <input
                                type="text"
                                id="name"
                                name="name"
                                placeholder="Enter Your Name"
                                required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="Enter Your Email"
                                required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="message">Your Message</label>
                    <div class="input-wrapper">
                        <svg class="input-icon textarea-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        <textarea
                                id="message"
                                name="message"
                                placeholder="Enter Your Message"
                                required></textarea>
                    </div>
                </div>

                <button type="submit" id="submitBtn">
                    <span>Send Message</span>
                    <svg class="btn-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
            </form>
        </div>

        <!-- Sleek AJAX Success Screen -->
        <div id="success-container" class="success-screen hidden">
            <div class="success-icon-wrapper">
                <svg class="success-checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                    <circle class="success-circle" cx="26" cy="26" r="25" fill="none"/>
                    <path class="success-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                </svg>
            </div>
            <h3>Thank You!</h3>
            <p id="success-msg">Your message has been sent successfully.</p>
            <button id="resetBtn" class="secondary-btn">Send Another Message</button>
        </div>

    </div>

</div>

<script>
    document.getElementById('contactForm').addEventListener('submit', function(e) {
        // Prevent full page reload to provide a premium SPA-like experience
        e.preventDefault();
        
        const form = e.target;
        const submitBtn = document.getElementById('submitBtn');
        const formContainer = document.getElementById('contact-form-container');
        const successContainer = document.getElementById('success-container');
        const successMsg = document.getElementById('success-msg');
        
        // Show loading state
        submitBtn.classList.add('loading');
        submitBtn.disabled = true;
        submitBtn.querySelector('span').textContent = 'Sending...';

        const formData = new URLSearchParams(new FormData(form));

        fetch(form.action, {
            method: 'POST',
            body: formData,
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            }
        })
        .then(response => {
            if (response.ok) {
                return response.text();
            }
            throw new Error('Network response was not ok');
        })
        .then(data => {
            // Animate transition to success
            formContainer.classList.add('fade-out');
            setTimeout(() => {
                formContainer.classList.add('hidden');
                successContainer.classList.remove('hidden');
                successContainer.classList.add('fade-in');
                if (data) {
                    successMsg.textContent = data;
                }
            }, 300);
        })
        .catch(error => {
            console.error('Error:', error);
            // Fallback: if fetch fails, perform native form submit
            form.submit();
        })
        .finally(() => {
            submitBtn.classList.remove('loading');
            submitBtn.disabled = false;
            submitBtn.querySelector('span').textContent = 'Send Message';
        });
    });

    document.getElementById('resetBtn').addEventListener('click', function() {
        const form = document.getElementById('contactForm');
        const formContainer = document.getElementById('contact-form-container');
        const successContainer = document.getElementById('success-container');
        
        form.reset();
        
        successContainer.classList.add('fade-out');
        setTimeout(() => {
            successContainer.classList.add('hidden');
            successContainer.classList.remove('fade-out', 'fade-in');
            formContainer.classList.remove('hidden', 'fade-out');
            formContainer.classList.add('fade-in');
        }, 300);
    });
</script>

</body>
</html>
